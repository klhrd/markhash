<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MarkHash v6.8</title>
    
    <!-- PWA Settings -->
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./images/icons/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="MarkHash">

    <!-- 核心工具與樣式 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github.min.css" id="hljs-light">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css" id="hljs-dark" disabled>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-body: #dadada;       --bg-paper: #ffffff;      
            --text-primary: #111827;  --text-secondary: #4b5563;
            --border-color: #cbd5e1;  --accent-color: #3b82f6;  
            --hover-bg: rgba(0, 0, 0, 0.05);
            --success-color: #10b981; --warning-color: #f59e0b; --danger-color: #ef4444;
            --dropdown-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-body: #0f172a;       --bg-paper: #1e293b;      
                --text-primary: #f8fafc;  --text-secondary: #94a3b8;
                --border-color: #334155;
                --hover-bg: rgba(255, 255, 255, 0.08);
                --dropdown-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            }
        }

        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0; background-color: var(--bg-body); color: var(--text-primary);
            display: flex; flex-direction: column; height: 100dvh; overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        header {
            height: 50px; background: var(--bg-paper); border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; padding: 0 16px; justify-content: space-between;
            z-index: 100;
        }

        .logo-group { display: flex; align-items: center; gap: 10px; }
        .logo svg { width: 34px; height: 34px; fill: currentColor; }
        .version-tag {
            font-family: 'Roboto Mono', monospace; font-size: 13px; font-weight: 700;
            color: var(--text-secondary); background: var(--hover-bg);
            padding: 2px 6px; border-radius: 4px;
        }

        .controls { display: flex; align-items: center; gap: 12px; }
        button.icon-btn {
            background: transparent; border: none; color: var(--text-secondary);
            width: 36px; height: 36px; border-radius: 8px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s ease;
        }
        button.icon-btn:hover { background-color: var(--hover-bg); color: var(--text-primary); }

        .url-stats { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 6px 10px; border-radius: 20px; }
        .url-stats span { font-family: 'Roboto Mono', monospace; font-size: 12px; color: var(--text-primary); }
        .dot { width: 10px; height: 10px; border-radius: 50%; background-color: var(--success-color); box-shadow: 0 0 4px rgba(0,0,0,0.2); }

        .container { display: flex; flex: 1; overflow: hidden; }
        .panel { flex: 1; display: flex; flex-direction: column; height: 100%; overflow: hidden; background: var(--bg-paper); position: relative; }
        #editorPanel { border-right: 1px solid var(--border-color); }

        #editor {
            width: 100%; height: 100%; padding: 24px; font-family: 'Roboto Mono', monospace !important; 
            font-size: 15px; line-height: 1.6; border: none; outline: none; resize: none;
            background: transparent !important; color: transparent !important; caret-color: var(--text-primary);
            white-space: pre-wrap; word-wrap: break-word; z-index: 2; position: relative;
        }
        #editor-highlighting {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 24px;
            font-family: 'Roboto Mono', monospace !important; font-size: 15px; line-height: 1.6;
            overflow-y: hidden; pointer-events: none; white-space: pre-wrap; word-wrap: break-word;
            color: var(--text-primary); z-index: 1;
        }

        .h-heading { color: #2563eb; font-weight: bold; }
        .h-bold { color: #dc2626; font-weight: bold; }
        .h-italic { color: #059669; font-style: italic; }
        .h-bold-italic { color: #dc2626; font-weight: bold; font-style: italic; }
        .h-strikethrough { text-decoration: line-through; opacity: 0.6; }
        .h-code { color: #d97706; background-color: rgba(217, 119, 6, 0.1); }
        .h-list { color: #8b5cf6; font-weight: bold; }
        .h-quote { color: #64748b; font-style: italic; border-left: 2px solid #cbd5e1; padding-left: 4px; }
        .h-link-text { color: #0891b2; text-decoration: underline; }
        .h-math { color: #c026d3; font-weight: 500; }

        @media (prefers-color-scheme: dark) {
            .h-bold { color: #f87171; } .h-italic { color: #34d399; } .h-bold-italic { color: #f87171; }
            .h-heading { color: #60a5fa; } .h-math { color: #e879f9; }
        }

        #preview-container { flex: 1; overflow-y: auto; padding: 32px 48px; }
        .markdown-body { background: transparent !important; color: var(--text-primary) !important; line-height: 1.8; }
        .katex-display { background: transparent !important; color: inherit; padding: 10px 0; }

        .dropdown-menu {
            position: absolute; top: 100%; right: 0; background-color: var(--bg-paper);
            border: 1px solid var(--border-color); border-radius: 12px; box-shadow: var(--dropdown-shadow);
            min-width: 180px; display: none; flex-direction: column; padding: 8px; z-index: 1000;
        }
        .dropdown-menu.show { display: flex; }
        .dropdown-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border: none; background: transparent; color: var(--text-primary); cursor: pointer; font-size: 14px; border-radius: 6px; width: 100%; }
        .dropdown-item:hover { background-color: var(--hover-bg); }

        #toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); background: var(--text-primary); color: var(--bg-paper); padding: 12px 24px; border-radius: 12px; font-size: 14px; opacity: 0; transition: opacity 0.3s; z-index: 2000; pointer-events: none; }
        #toast.show { opacity: 1; }

        @media (max-width: 768px) { #preview-container { padding: 24px; } .panel { display: none; } .panel.active { display: flex; } }
    </style>
</head>
<body>

<input type="file" id="fileInput" style="display: none" accept=".md,.txt,.markdown">

<header>
    <div class="logo-group">
        <div class="logo">
            <svg viewBox="-450 -450 900 900">
                <path d="M 40 60 h 50 l -10 60 h 35 l 10 -60 h 40 l -10 60 h 35 l 10 -60 h 50 L 270 60 L 270 30 L 205 30 L 215 -30 L 270 -30 L 270 -60 L 270 -60 h -50 l 10 -60 h -35 l -10 60 h -40 l 10 -60 h -35 l -10 60 h -50 l -5 30 h 50 l -10 60 h 35 l 10 -60 h 40 l -10 60 h -40 h -35 h -50 l -5 30 Z M -320 320 q -33 0 -56.5 -23.5 T -400 240 v -480 q 0 -33 23.5 -56.5 T -320 -320 h 640 q 33 0 56.5 23.5 T 400 -240 v 480 q 0 33 -23.5 56.5 T 320 320 H -320 Z m 0 -80 h 640 v -480 H -320 v 480 Z m 0 0 v -480 v 480 Z m 60 -120 h 60 v -180 h 40 v 120 h 60 v -120 h 40 v 180 h 60 v -200 q 0 -17 -11.5 -28.5 T -40 -120 H -220 q -17 0 -28.5 11.5 T -260 -80 v 200 Z" />
            </svg>
        </div>
        <div class="version-tag">v6.8</div>
    </div>

    <div class="controls">
        <div class="url-stats" onclick="this.classList.toggle('show-text')">
            <div class="dot" id="sizeDot"></div>
            <span id="sizeText">0 chars</span>
        </div>
        <button class="icon-btn" onclick="toggleMobileView()">
            <span class="material-symbols-outlined" id="toggleIcon">visibility</span>
        </button>
        <div class="dropdown">
            <button class="icon-btn" onclick="toggleMenu(event, 'fileMenu')"><span class="material-symbols-outlined">save</span></button>
            <div class="dropdown-menu" id="fileMenu">
                <button class="dropdown-item" onclick="triggerUpload()">匯入</button>
                <button class="dropdown-item" onclick="downloadFile()">下載</button>
            </div>
        </div>
        <div class="dropdown">
            <button class="icon-btn" onclick="toggleMenu(event, 'shareMenu')"><span class="material-symbols-outlined">share</span></button>
            <div class="dropdown-menu" id="shareMenu">
                <button class="dropdown-item" onclick="copyOriginalUrl()">複製長連結</button>
                <button class="dropdown-item" onclick="shortenUrl()">Is.gd 縮網址</button>
            </div>
        </div>
    </div>
</header>

<div class="container">
    <section class="panel active" id="editorPanel">
        <div class="editor-container">
            <div id="editor-highlighting"></div>
            <textarea id="editor" spellcheck="false" wrap="off" placeholder="# v6.8 高性能渲染測試
| ***粗斜體*** | `***粗斜體***` | ***粗斜體*** |"></textarea>
        </div>
    </section>
    <section class="panel" id="previewPanel">
        <div id="preview-container"><div id="preview" class="markdown-body"></div></div>
    </section>
</div>

<div id="toast"><span id="toastMsg"></span></div>

<script>
    const editor = document.getElementById('editor');
    const editorHighlighting = document.getElementById('editor-highlighting');
    const preview = document.getElementById('preview');
    const sizeText = document.getElementById('sizeText');
    const sizeDot = document.getElementById('sizeDot');
    
    // v6.8 Web Worker: 僅負責 Markdown 解析與 URL 壓縮
    const workerScript = `
        importScripts('https://cdn.jsdelivr.net/npm/marked/marked.min.js', 
                      'https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js',
                      'https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js',
                      'https://cdn.jsdelivr.net/npm/marked-katex-extension/lib/index.umd.js');
        
        try { marked.use(self.markedKatex({ throwOnError: false })); } catch(e) {}

        self.onmessage = function(e) {
            const { text } = e.data;
            try {
                const rawHtml = marked.parse(text);
                const hash = LZString.compressToEncodedURIComponent(text);
                self.postMessage({ html: rawHtml, hash, len: text.length });
            } catch (err) { console.error(err); }
        };
    `;

    const worker = new Worker(URL.createObjectURL(new Blob([workerScript], { type: 'text/javascript' })));

    worker.onmessage = (e) => {
        const { html, hash, len } = e.data;
        // 在主執行緒進行安全過濾，避免 Worker 環境 DOM 缺失問題
        preview.innerHTML = DOMPurify.sanitize(html, {
            USE_PROFILES: { html: true, mathMl: true, svg: true },
            ADD_ATTR: ['mathvariant', 'display']
        });
        if (hash) history.replaceState(null, null, '#' + hash);
        updateStats(len);
    };

    function updateStats(len) {
        sizeText.innerText = len + ' chars';
        sizeDot.style.backgroundColor = len <= 2000 ? 'var(--success-color)' : (len <= 8000 ? 'var(--warning-color)' : 'var(--danger-color)');
    }

    function highlightContent() {
        const text = editor.value || "";
        let html = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        const placeholders = new Map();
        let counter = 0;
        
        function addP(content) {
            const id = `\uE000${counter++}\uE001`;
            placeholders.set(id, content);
            return id;
        }

        html = html.replace(/```[\s\S]*?```/g, m => addP(`<span class="h-code">${m}</span>`));
        html = html.replace(/\$\$[\s\S]*?\$\$/g, m => addP(`<span class="h-math">${m}</span>`));
        html = html.replace(/`[^`\n]+`/g, m => addP(`<span class="h-code">${m}</span>`));
        html = html.replace(/(?<![\$\\])\$([^\$\n]+?)\$(?!\$)/g, m => addP(`<span class="h-math">${m}</span>`));

        // 樣式渲染：修正粗斜體與表格管道的衝突
        html = html.replace(/(\*\*\*|___)([^\s][\s\S]*?[^\s])\1/g, '<span class="h-bold-italic">$1$2$1</span>');
        html = html.replace(/(\*\*|__)([^\s][\s\S]*?[^\s])\1/g, '<span class="h-bold">$1$2$1</span>');
        html = html.replace(/(?<!\*)\*([^\s\*](?:.*?[^\s\*])?)\*(?!\*)/g, '<span class="h-italic">*$1*</span>');
        html = html.replace(/(?<!_)_([^\s_](?:.*?[^\s_])?)_(?!_)/g, '<span class="h-italic">_$1_</span>');
        html = html.replace(/(~~)([^\s][\s\S]*?[^\s])\1/g, '<span class="h-strikethrough">$1$2$1</span>');
        
        html = html.replace(/^(\s*([-*+]|\d+\.)\s+)(.*)/gm, '<span class="h-list">$1</span>$3');
        html = html.replace(/^(#+)(.*)/gm, '<span class="h-heading">$1$2</span>');
        html = html.replace(/\[(.*?)\]\((.*?)\)/g, '<span class="h-link-text">[$1]</span>($2)');
        html = html.replace(/^(\s*>\s*)(.*)/gm, '<span class="h-quote">$1$2</span>');

        if (placeholders.size > 0) {
            const re = new RegExp(Array.from(placeholders.keys()).join('|'), 'g');
            html = html.replace(re, m => placeholders.get(m));
        }
        editorHighlighting.innerHTML = html + '\n';
    }

    const debounce = (f, w) => { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => f(...a), w); }; };
    const triggerW = debounce(() => worker.postMessage({ text: editor.value }), 150);

    editor.addEventListener('input', () => { highlightContent(); updateStats(editor.value.length); triggerW(); });
    editor.addEventListener('scroll', () => { editorHighlighting.scrollTop = editor.scrollTop; editorHighlighting.scrollLeft = editor.scrollLeft; });

    function toggleMenu(e, id) {
        e.stopPropagation();
        const m = document.getElementById(id);
        const s = m.classList.contains('show');
        document.querySelectorAll('.dropdown-menu').forEach(d => d.classList.remove('show'));
        if (!s) m.classList.add('show');
    }
    document.addEventListener('click', () => document.querySelectorAll('.dropdown-menu').forEach(d => d.classList.remove('show')));

    function toggleMobileView() {
        document.getElementById('editorPanel').classList.toggle('active');
        document.getElementById('previewPanel').classList.toggle('active');
        document.getElementById('toggleIcon').innerText = document.getElementById('previewPanel').classList.contains('active') ? 'edit' : 'visibility';
    }

    function showToast(m) { const t = document.getElementById('toast'); document.getElementById('toastMsg').innerText = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }
    function copyToClipboard(t) { navigator.clipboard.writeText(t).then(() => showToast("已複製")); }
    function copyOriginalUrl() { copyToClipboard(window.location.href); }
    async function shortenUrl() {
        showToast("產出中...");
        try {
            const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://is.gd/create.php?format=json&url=${encodeURIComponent(window.location.href)}`)}`);
            const d = await r.json();
            const s = JSON.parse(d.contents).shorturl;
            if (s) copyToClipboard(s);
        } catch (e) { showToast("失敗"); }
    }

    function triggerUpload() { document.getElementById('fileInput').click(); }
    document.getElementById('fileInput').onchange = (e) => {
        const r = new FileReader();
        r.onload = (ev) => { editor.value = ev.target.result; editor.dispatchEvent(new Event('input')); };
        r.readAsText(e.target.files[0]);
    };
    function downloadFile() { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([editor.value], {type: 'text/markdown'})); a.download = 'markhash.md'; a.click(); }

    window.onload = () => {
        const h = window.location.hash.substring(1);
        if (h) {
            const d = LZString.decompressFromEncodedURIComponent(h);
            if (d) { editor.value = d; highlightContent(); updateStats(d.length); triggerW(); }
        } else { highlightContent(); triggerW(); }
    };
</script>
</body>
</html>
