<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MarkHash v5.7</title>
    
    <!-- PWA Settings -->
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./images/icons/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="MarkHash">

    <!-- 1. 核心解析庫：Marked.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- 2. 安全過濾庫：DOMPurify -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

    <!-- 3. 程式碼高亮：Highlight.js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github.min.css" id="hljs-light">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css" id="hljs-dark" disabled>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

    <!-- 4. 壓縮核心：LZ-String -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>

    <!-- 5. LaTeX 數學支援：KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked-katex-extension/lib/index.umd.js"></script>

    <!-- 6. 預覽樣式：GitHub Markdown CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">

    <!-- 7. Google Material Symbols -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <!-- 8. 字體設定 -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* 淺色模式 */
            --bg-body: #dadada;       
            --bg-paper: #ffffff;      
            --text-primary: #111827;  
            --text-secondary: #4b5563;
            --border-color: #cbd5e1;  
            --accent-color: #3b82f6;  
            --hover-bg: rgba(0, 0, 0, 0.05);
            
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --dropdown-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-body: #0f172a;       
                --bg-paper: #1e293b;      
                --text-primary: #f8fafc;  
                --text-secondary: #94a3b8;
                --border-color: #334155;
                --hover-bg: rgba(255, 255, 255, 0.08);
                --dropdown-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            }
        }

        * { box-sizing: border-box; }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            background-color: var(--bg-body);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            height: 100dvh; 
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
            overscroll-behavior: none;
        }

        header {
            height: 50px;
            background: var(--bg-paper);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 16px;
            justify-content: space-between;
            z-index: 100;
            flex-shrink: 0;
        }

        .logo-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            user-select: none;
        }

        .logo svg {
            width: 32px;
            height: 32px;
            fill: currentColor;
        }

        .version-tag {
            font-family: 'Roboto Mono', monospace;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            padding-top: 2px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        button.icon-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        button.icon-btn:hover {
            background-color: var(--hover-bg);
            color: var(--text-primary);
        }

        /* 狀態指示燈 */
        .url-stats {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 20px;
            transition: background 0.2s;
        }
        
        .url-stats:hover { background: var(--hover-bg); }

        .url-stats span {
            font-family: 'Roboto Mono', monospace;
            font-size: 12px;
            display: none; 
            color: var(--text-primary);
        }
        
        .url-stats.show-text span { display: inline; }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--success-color);
            box-shadow: 0 0 4px rgba(0,0,0,0.2);
            transition: background-color 0.3s;
        }

        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            background: var(--bg-paper);
        }

        #editorPanel { border-right: 1px solid var(--border-color); }

        .editor-container {
            position: relative;
            flex: 1;
            background: var(--bg-paper);
        }

        #editor {
            width: 100%;
            height: 100%;
            padding: 24px;
            font-family: 'Roboto Mono', monospace !important; 
            font-size: 15px;
            line-height: 1.6;
            border: none;
            outline: none;
            resize: none;
            background: transparent !important;
            color: transparent !important;
            caret-color: var(--text-primary);
            white-space: pre-wrap; 
            word-wrap: break-word; 
            z-index: 2;
            position: relative;
        }

        #editor-highlighting {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 24px;
            font-family: 'Roboto Mono', monospace !important;
            font-size: 15px;
            line-height: 1.6;
            overflow-y: hidden;
            pointer-events: none;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: var(--text-primary);
            z-index: 1;
        }

        /* 語法高亮樣式 (v5.7) */
        .h-heading { color: #2563eb; font-weight: bold; }
        .h-bold { color: #dc2626; font-weight: bold; }   
        .h-italic { color: #059669; font-style: italic; } 
        .h-code { color: #d97706; background-color: rgba(217, 119, 6, 0.1); padding: 0 2px; border-radius: 3px; }
        .h-list { color: #7c3aed; }
        .h-quote { color: #64748b; font-style: italic; border-left: 2px solid #cbd5e1; padding-left: 4px; }
        .h-link-text { color: #0891b2; text-decoration: underline; }
        .h-link-url { color: #0891b2; opacity: 0.6; }
        .h-hr { color: #94a3b8; }
        .h-math { color: #c026d3; }

        @media (prefers-color-scheme: dark) {
            .h-bold { color: #f87171; }
            .h-italic { color: #34d399; }
            .h-heading { color: #60a5fa; }
        }

        #preview-container {
            flex: 1;
            overflow-y: auto;
            padding: 32px 48px;
        }

        .markdown-body {
            background: transparent !important;
            color: var(--text-primary) !important;
            font-family: system-ui, -apple-system, sans-serif !important;
            line-height: 1.8;
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            right: 0;
            background-color: var(--bg-paper);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: var(--dropdown-shadow);
            min-width: 180px;
            display: none;
            flex-direction: column;
            padding: 8px;
            z-index: 1000;
        }
        .dropdown-menu.show { display: flex; }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border: none;
            background: transparent;
            color: var(--text-primary);
            cursor: pointer;
            text-align: left;
            font-size: 14px;
            border-radius: 6px;
            width: 100%;
        }
        .dropdown-item:hover { background-color: var(--hover-bg); }

        #toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--text-primary);
            color: var(--bg-paper);
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 2000;
        }
        #toast.show { opacity: 1; }

        @media (max-width: 768px) {
            #preview-container { padding: 24px; }
            .panel { display: none; }
            .panel.active { display: flex; }
        }
    </style>
</head>
<body>

<input type="file" id="fileInput" style="display: none" accept=".md,.txt,.markdown">

<header>
    <div class="logo-group">
        <div class="logo">
            <svg viewBox="100 -850 800 850">
                <path d="M+520-420 h+50 l-10+60 h+35 l+10-60 h+40 l-10+60 h+35 l+10-60 h+50 L+750-420 L+750-450 L+685-450 L+695-510 L+750-510 L+750-540 L+750-540 h-50 l+10-60 h-35 l-10+60 h-40 l+10-60 h-35 l-10+60 h-50 l-5+30 h+50 l-10+60 h+35 l+10-60 h+40 l-10+60 h-40 h-35 h-50 l-5+30 Z M160-160q-33 0-56.5-23.5T80-240v-480q0-33 23.5-56.5T160-800h640q33 0 56.5 23.5T880-720v480q0 33-23.5 56.5T800-160H160Zm0-80h640v-480H160v480Zm0 0v-480 480Zm60-120h60v-180h40v120h60v-120h40v180h60v-200q0-17-11.5-28.5T440-600H260q-17 0-28.5 11.5T220-560v200Z" />
            </svg>
        </div>
        <div class="version-tag">v5.7</div>
    </div>

    <div class="controls">
        <div class="url-stats" id="urlStats" onclick="this.classList.toggle('show-text')">
            <div class="dot" id="sizeDot"></div>
            <span id="sizeText">0 chars</span>
        </div>

        <button class="icon-btn" id="toggleViewBtn" onclick="toggleMobileView()">
            <span class="material-symbols-outlined" id="toggleIcon">visibility</span>
        </button>

        <div class="dropdown">
            <button class="icon-btn" onclick="toggleMenu('fileMenu')"><span class="material-symbols-outlined">save</span></button>
            <div class="dropdown-menu" id="fileMenu">
                <button class="dropdown-item" onclick="triggerUpload()">匯入</button>
                <button class="dropdown-item" onclick="downloadFile()">下載</button>
            </div>
        </div>

        <div class="dropdown">
            <button class="icon-btn" onclick="toggleMenu('shareMenu')"><span class="material-symbols-outlined">share</span></button>
            <div class="dropdown-menu" id="shareMenu">
                <button class="dropdown-item" onclick="copyOriginalUrl()">複製長連結</button>
                <button class="dropdown-item" onclick="shortenUrl('isgd')">Is.gd 縮網址</button>
            </div>
        </div>
    </div>
</header>

<div class="container">
    <section class="panel active" id="editorPanel">
        <div class="editor-container">
            <div id="editor-highlighting"></div>
            <textarea id="editor" placeholder="# v5.7 測試
這是*斜體*內容。
這是**粗體**內容。
*緊貼斜體*
**緊貼粗體**
*混合**粗體**斜體*" spellcheck="false" wrap="off"></textarea>
        </div>
    </section>
    <section class="panel" id="previewPanel">
        <div id="preview-container"><div id="preview" class="markdown-body"></div></div>
    </section>
</div>

<div id="toast"><span id="toastMsg"></span></div>

<script>
    const editor = document.getElementById('editor');
    const editorHighlighting = document.getElementById('editor-highlighting');
    const preview = document.getElementById('preview');
    
    // 語法高亮 (v5.7 優化正則，支援無空格渲染)
    function highlightContent() {
        const text = editor.value;
        let html = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        
        // 1. 區塊程式碼
        html = html.replace(/(```[\s\S]*?```)/g, '<span class="h-code">$1</span>');

        // 2. 粗體 (修正：支援緊貼文字，並優先於斜體處理)
        // 使用 [^\s\*] 確保不匹配空格開頭，並確保前後匹配對稱
        html = html.replace(/(\*\*)([^\s\*][^\*]*?[^\s\*]|[^\s\*])\1/g, '<span class="h-bold">$1$2$1</span>');
        html = html.replace(/(__)([^\s_][^_]*?[^\s_]|[^\s_])\1/g, '<span class="h-bold">$1$2$1</span>');

        // 3. 斜體 (修正：支援緊貼文字)
        html = html.replace(/(\*)([^\s\*][^\*]*?[^\s\*]|[^\s\*])\1/g, '<span class="h-italic">$1$2$1</span>');
        html = html.replace(/(_)([^\s_][^_]*?[^\s_]|[^\s_])\1/g, '<span class="h-italic">$1$2$1</span>');

        // 4. 其他語法
        html = html.replace(/`([^`]+)`/g, '<span class="h-code">`$1`</span>');
        html = html.replace(/^(#+)(.*)/gm, '<span class="h-heading">$1$2</span>');
        html = html.replace(/\[(.*?)\]\((.*?)\)/g, '<span class="h-link-text">[$1]</span><span class="h-link-url">($2)</span>');
        html = html.replace(/^(\s*>\s*)(.*)/gm, '<span class="h-quote">$1$2</span>');
        html = html.replace(/^(\s*[-*+]\s+)(.*)/gm, '<span class="h-list">$1$2</span>');
        html = html.replace(/(\$\$[\s\S]*?\$\$)/g, '<span class="h-math">$1</span>');

        editorHighlighting.innerHTML = html + '\n';
    }

    editor.addEventListener('input', () => {
        const raw = editor.value;
        preview.innerHTML = DOMPurify.sanitize(marked.parse(raw));
        highlightContent();
        updateHash();
    });

    editor.addEventListener('scroll', () => {
        editorHighlighting.scrollTop = editor.scrollTop;
    });

    function updateHash() {
        const rawValue = editor.value;
        const compressed = LZString.compressToEncodedURIComponent(rawValue);
        if (compressed) history.replaceState(null, null, '#' + compressed);
        
        const fullLength = window.location.href.length;
        document.getElementById('sizeText').innerText = fullLength + ' chars';
        
        // v5.7 指示燈邏輯優化：寬鬆的綠色範圍
        const dot = document.getElementById('sizeDot');
        if (fullLength < 4000) {
            dot.style.backgroundColor = 'var(--success-color)';
        } else if (fullLength < 8000) {
            dot.style.backgroundColor = 'var(--warning-color)';
        } else {
            dot.style.backgroundColor = 'var(--danger-color)';
        }
    }

    function loadHash() {
        const hash = window.location.hash.substring(1);
        if (hash) {
            const decompressed = LZString.decompressFromEncodedURIComponent(hash);
            if (decompressed) {
                editor.value = decompressed;
                preview.innerHTML = DOMPurify.sanitize(marked.parse(editor.value));
                highlightContent();
                updateHash();
            }
        }
    }

    function toggleMenu(id) {
        document.querySelectorAll('.dropdown-menu').forEach(m => {
            if (m.id !== id) m.classList.remove('show');
        });
        document.getElementById(id).classList.toggle('show');
    }

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.dropdown')) {
            document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show'));
        }
    });

    function toggleMobileView() {
        document.getElementById('editorPanel').classList.toggle('active');
        document.getElementById('previewPanel').classList.toggle('active');
        document.getElementById('toggleIcon').innerText = document.getElementById('previewPanel').classList.contains('active') ? 'edit' : 'visibility';
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        document.getElementById('toastMsg').innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => showToast("已複製到剪貼簿"));
    }

    async function shortenUrl(s) {
        showToast("產出中...");
        const url = `https://is.gd/create.php?format=json&url=${encodeURIComponent(window.location.href)}`;
        try {
            const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
            const d = await r.json();
            const sUrl = JSON.parse(d.contents).shorturl;
            if (sUrl) copyToClipboard(sUrl);
        } catch (e) { showToast("失敗"); }
    }

    function triggerUpload() { document.getElementById('fileInput').click(); }
    document.getElementById('fileInput').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            editor.value = ev.target.result;
            editor.dispatchEvent(new Event('input'));
        };
        reader.readAsText(e.target.files[0]);
    };

    function downloadFile() {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([editor.value], {type: 'text/markdown'}));
        a.download = 'markhash.md';
        a.click();
    }

    loadHash();
    if (!editor.value) updateHash();
</script>

</body>
</html>
